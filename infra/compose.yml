services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: huposit-postgres
    environment:
      POSTGRES_DB: pgvdb
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d pgvdb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: